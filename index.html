<body>
  <!-- Password Gate -->
  <div id="authGate" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#0f0f1a;">
    <div style="width:340px;text-align:center;font-family:Inter,system-ui,sans-serif;">
      <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:24px;">
        <rect x="2" y="20" width="4" height="10" rx="1" fill="#fff" opacity="0.3"/>
        <rect x="8" y="14" width="4" height="16" rx="1" fill="#fff" opacity="0.5"/>
        <rect x="14" y="8" width="4" height="22" rx="1" fill="#fff" opacity="0.7"/>
        <rect x="20" y="4" width="4" height="26" rx="1" fill="#6ee7b7"/>
        <rect x="26" y="10" width="4" height="20" rx="1" fill="#fff" opacity="0.5"/>
        <line x1="4" y1="2" x2="22" y2="2" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round"/>
        <circle cx="22" cy="2" r="2" fill="#6ee7b7"/>
      </svg>
      <h1 style="color:#fff;font-size:20px;font-weight:600;margin:0 0 6px;">Auction Mentor Academy</h1>
      <p style="color:#888;font-size:14px;margin:0 0 28px;">Enter your access code to continue.</p>
      <form id="authForm" autocomplete="off">
        <input id="authInput" type="password" placeholder="Access Code" autocomplete="off"
          style="width:100%;box-sizing:border-box;padding:12px 16px;border:1px solid #2a2a3e;border-radius:8px;background:#1a1a2e;color:#fff;font-size:15px;font-family:Inter,system-ui,sans-serif;outline:none;transition:border-color .2s;"
          onfocus="this.style.borderColor='#6ee7b7'" onblur="this.style.borderColor='#2a2a3e'">
        <p id="authError" style="color:#f87171;font-size:13px;margin:10px 0 0;display:none;">Incorrect access code. Please try again.</p>
        <button type="submit"
          style="width:100%;margin-top:16px;padding:12px;border:none;border-radius:8px;background:#6ee7b7;color:#0f0f1a;font-size:15px;font-weight:600;font-family:Inter,system-ui,sans-serif;cursor:pointer;transition:opacity .2s;"
          onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">Enter</button>
      </form>
    </div>
  </div>
  <script>
    (function(){
      var HASH="d1410a4a7c8d3613ddc61d5ceabcd656968719236a4c71a82142f2cd55547cbb";
      var gate=document.getElementById("authGate");
      var form=document.getElementById("authForm");
      var input=document.getElementById("authInput");
      var err=document.getElementById("authError");
      form.addEventListener("submit",function(e){
        e.preventDefault();
        var pw=input.value;
        crypto.subtle.digest("SHA-256",new TextEncoder().encode(pw)).then(function(buf){
          var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
          if(hex===HASH){
            gate.style.display="none";
          }else{
            err.style.display="block";
            input.value="";
            input.focus();
          }
        });
      });
      input.focus();
    })();
  </script>

  <div id="app"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
