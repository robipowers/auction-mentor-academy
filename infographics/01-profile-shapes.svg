<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <style>
      .title { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 48px; font-weight: 700; fill: #e8e8e8; }
      .shape-name { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 28px; font-weight: 700; fill: #00d4aa; }
      .signal { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 18px; font-weight: 400; fill: #e8e8e8; }
      .trade { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 16px; font-weight: 400; fill: #888888; }
      .footer { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 16px; font-weight: 500; fill: #666666; }
      .panel-bg { fill: #242424; }
      .profile-fill { fill: #00d4aa; opacity: 0.3; }
      .profile-stroke { stroke: #00d4aa; stroke-width: 2; fill: none; }
      .poc-line { stroke: #00d4aa; stroke-width: 3; stroke-dasharray: 8,4; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="540" y="120" text-anchor="middle" class="title">The 5 Profile Shapes</text>

  <!-- Panel 1: Bell/Normal -->
  <g transform="translate(40, 180)">
    <rect width="1000" height="300" rx="12" class="panel-bg"/>

    <!-- Bell shape profile -->
    <g transform="translate(80, 30)">
      <path d="M 0 240 Q 60 240 80 200 Q 100 160 120 100 Q 140 40 160 30 Q 180 40 200 100 Q 220 160 240 200 Q 260 240 320 240 Z" class="profile-fill"/>
      <path d="M 0 240 Q 60 240 80 200 Q 100 160 120 100 Q 140 40 160 30 Q 180 40 200 100 Q 220 160 240 200 Q 260 240 320 240" class="profile-stroke"/>
      <line x1="0" y1="130" x2="320" y2="130" class="poc-line"/>
      <text x="330" y="135" class="trade" fill="#00d4aa">POC</text>
    </g>

    <!-- Text -->
    <g transform="translate(480, 60)">
      <text class="shape-name">Bell / Normal</text>
      <text y="50" class="signal">POC near center. Symmetrical volume</text>
      <text y="80" class="signal">distribution. Buyers and sellers found</text>
      <text y="110" class="signal">equilibrium. Neither side dominated.</text>
      <text y="160" class="trade">TRADE: Fade VA edges, target POC.</text>
      <text y="190" class="trade">Breakouts are unlikely. Plan rotation.</text>
    </g>
  </g>

  <!-- Panel 2: P-Shape -->
  <g transform="translate(40, 510)">
    <rect width="1000" height="300" rx="12" class="panel-bg"/>

    <!-- P shape profile -->
    <g transform="translate(80, 30)">
      <path d="M 0 240 L 40 240 Q 60 240 80 220 Q 100 200 100 180 Q 100 60 140 40 Q 200 20 260 40 Q 320 60 320 120 Q 320 180 280 220 Q 240 260 180 260 L 0 260 Z" class="profile-fill"/>
      <path d="M 0 240 L 40 240 Q 60 240 80 220 Q 100 200 100 180 Q 100 60 140 40 Q 200 20 260 40 Q 320 60 320 120 Q 320 180 280 220 Q 240 260 180 260" class="profile-stroke"/>
      <line x1="0" y1="80" x2="320" y2="80" class="poc-line"/>
      <text x="330" y="85" class="trade" fill="#00d4aa">POC</text>
    </g>

    <!-- Text -->
    <g transform="translate(480, 60)">
      <text class="shape-name">P Shape</text>
      <text y="50" class="signal">Heavy volume concentrated at highs.</text>
      <text y="80" class="signal">Thin lower section. POC near the top.</text>
      <text y="110" class="signal">Potential distribution or reversal signal.</text>
      <text y="160" class="trade">TRADE: Fade top edge if opens inside P.</text>
      <text y="190" class="trade">Close in upper half is bullish continuation.</text>
    </g>
  </g>

  <!-- Panel 3: b-Shape -->
  <g transform="translate(40, 840)">
    <rect width="1000" height="300" rx="12" class="panel-bg"/>

    <!-- b shape profile -->
    <g transform="translate(80, 30)">
      <path d="M 0 20 L 180 20 Q 240 20 280 60 Q 320 100 320 160 Q 320 220 260 240 Q 200 260 140 240 Q 80 220 80 180 Q 80 100 60 60 Q 40 20 0 20 Z" class="profile-fill"/>
      <path d="M 0 20 L 180 20 Q 240 20 280 60 Q 320 100 320 160 Q 320 220 260 240 Q 200 260 140 240 Q 80 220 80 180 Q 80 100 60 60 Q 40 20 0 20" class="profile-stroke"/>
      <line x1="0" y1="180" x2="320" y2="180" class="poc-line"/>
      <text x="330" y="185" class="trade" fill="#00d4aa">POC</text>
    </g>

    <!-- Text -->
    <g transform="translate(480, 60)">
      <text class="shape-name">b Shape</text>
      <text y="50" class="signal">Heavy volume concentrated at lows.</text>
      <text y="80" class="signal">Thin upper section. POC near bottom.</text>
      <text y="110" class="signal">Bearish momentum may be exhausting.</text>
      <text y="160" class="trade">TRADE: Thin upper edge acts as resistance.</text>
      <text y="190" class="trade">Close in upper half signals possible reversal.</text>
    </g>
  </g>

  <!-- Panel 4: Thin/Elongated -->
  <g transform="translate(40, 1170)">
    <rect width="1000" height="300" rx="12" class="panel-bg"/>

    <!-- Thin profile -->
    <g transform="translate(80, 30)">
      <path d="M 60 240 L 80 240 L 90 220 L 100 200 L 95 180 L 105 160 L 100 140 L 110 120 L 105 100 L 115 80 L 110 60 L 120 40 L 115 20 L 80 20 L 70 40 L 75 60 L 65 80 L 70 100 L 60 120 L 65 140 L 55 160 L 60 180 L 50 200 L 55 220 Z" class="profile-fill"/>
      <path d="M 60 240 L 80 240 L 90 220 L 100 200 L 95 180 L 105 160 L 100 140 L 110 120 L 105 100 L 115 80 L 110 60 L 120 40 L 115 20 L 80 20 L 70 40 L 75 60 L 65 80 L 70 100 L 60 120 L 65 140 L 55 160 L 60 180 L 50 200 L 55 220 Z" class="profile-stroke"/>
    </g>

    <!-- Text -->
    <g transform="translate(480, 60)">
      <text class="shape-name">Thin / Elongated</text>
      <text y="50" class="signal">Tall and narrow. Volume spread across</text>
      <text y="80" class="signal">many levels with no dominant node.</text>
      <text y="110" class="signal">One side dominated. Strong trend day.</text>
      <text y="160" class="trade">TRADE: Do NOT fade. Follow the direction.</text>
      <text y="190" class="trade">Target next HVN or structural level.</text>
    </g>
  </g>

  <!-- Panel 5: Bimodal -->
  <g transform="translate(40, 1500)">
    <rect width="1000" height="300" rx="12" class="panel-bg"/>

    <!-- Bimodal profile -->
    <g transform="translate(80, 30)">
      <!-- Upper hump -->
      <path d="M 0 80 Q 40 80 60 60 Q 80 40 100 30 Q 140 20 180 30 Q 200 40 220 60 Q 240 80 280 80 L 280 100 L 0 100 Z" class="profile-fill"/>
      <path d="M 0 80 Q 40 80 60 60 Q 80 40 100 30 Q 140 20 180 30 Q 200 40 220 60 Q 240 80 280 80" class="profile-stroke"/>
      <!-- LVN gap -->
      <rect x="100" y="110" width="80" height="30" fill="#1a1a1a" stroke="#00d4aa" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="290" y="130" class="trade" fill="#888888">LVN</text>
      <!-- Lower hump -->
      <path d="M 0 160 Q 40 160 60 180 Q 80 200 100 210 Q 140 220 180 210 Q 200 200 220 180 Q 240 160 280 160 L 280 180 L 0 180 Z" class="profile-fill"/>
      <path d="M 0 160 Q 40 160 60 180 Q 80 200 100 210 Q 140 220 180 210 Q 200 200 220 180 Q 240 160 280 160" class="profile-stroke"/>
    </g>

    <!-- Text -->
    <g transform="translate(480, 60)">
      <text class="shape-name">Bimodal / Double Distribution</text>
      <text y="50" class="signal">Two distinct volume peaks (HVNs)</text>
      <text y="80" class="signal">separated by an LVN valley. Market</text>
      <text y="110" class="signal">broke out, then found new acceptance.</text>
      <text y="160" class="trade">TRADE: The LVN is the decision point.</text>
      <text y="190" class="trade">Expect fast continuation or battle there.</text>
    </g>
  </g>

  <!-- Footer -->
  <rect x="0" y="1860" width="1080" height="60" fill="#141414"/>
  <text x="540" y="1898" text-anchor="middle" class="footer">Auction Mentor | academy.auctionmentor.io</text>
</svg>
